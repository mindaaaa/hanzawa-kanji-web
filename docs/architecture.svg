<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Hanzawa-Kanji 앱 아키텍처">
  <title>Hanzawa-Kanji Architecture</title>
  <desc>React 프론트엔드가 Kotlin/Spring 백엔드와 HTTP로 통신하는 구조. Storybook이 UI를 격리된 환경에서 검증. useQuizEngine이 핵심 훅.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 600 13px system-ui, -apple-system, "Segoe UI", sans-serif; letter-spacing: 0.08em; }
      .h1    { font: 600 17px system-ui, sans-serif; }
      .body  { font: 400 13px system-ui, sans-serif; }
      .mono  { font: 500 13px "SF Mono", Monaco, Consolas, monospace; }
      .arr   { font: 500 12px "SF Mono", monospace; letter-spacing: 0.06em; }
      .note  { font: 400 12px system-ui, sans-serif; font-style: italic; }
    </style>
  </defs>

  <g>
    <rect x="46" y="46" width="440" height="260" fill="#1a1a1a"/>
    <rect x="40" y="40" width="440" height="260" fill="#fbf5e1" stroke="#1a1a1a" stroke-width="3"/>
    <text class="title" x="64" y="68" fill="#1a1a1a">FRONTEND</text>
    <text class="h1" x="64" y="94" fill="#1a1a1a">hanzawa-kanji-web</text>
    <text class="body" x="64" y="116" fill="#3b3833">React 19 · Vite 6 · React Router 7</text>

    <g>
      <rect x="70" y="146" width="392" height="72" fill="#1a1a1a"/>
      <rect x="64" y="140" width="392" height="72" fill="#e2513c" stroke="#1a1a1a" stroke-width="2.5"/>
      <text class="title" x="84" y="164" fill="#f5ecd4">CORE HOOK</text>
      <text class="mono" x="84" y="186" fill="#fbf5e1">useQuizEngine</text>
      <text class="body" x="84" y="204" fill="#fbf5e1">모드 분기 · 보기 풀 프리로드 · 정답 판정</text>
    </g>

    <g>
      <rect x="64" y="228" width="392" height="52" fill="#fbf5e1" stroke="#1a1a1a" stroke-width="2"/>
      <text class="mono" x="84" y="252" fill="#1a1a1a">fetcher</text>
      <text class="body" x="156" y="252" fill="#3b3833">mock / real 분기</text>
      <text class="note" x="84" y="270" fill="#5c5245">VITE_USE_MOCK 환경 변수로 전환</text>
    </g>
  </g>

  <g>
    <rect x="546" y="46" width="320" height="136" fill="#1a1a1a"/>
    <rect x="540" y="40" width="320" height="136" fill="#f2b83a" stroke="#1a1a1a" stroke-width="2.5"/>
    <text class="title" x="564" y="68" fill="#1a1a1a">DEV TOOL</text>
    <text class="h1" x="564" y="94" fill="#1a1a1a">Storybook 10</text>
    <text class="body" x="564" y="116" fill="#3b3833">격리된 UI 개발 · 검증</text>
    <text class="mono" x="564" y="148" fill="#1a1a1a">:6006</text>
    <text class="body" x="610" y="148" fill="#3b3833">*.stories.jsx</text>
  </g>

  <line x1="540" y1="108" x2="484" y2="108" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <line x1="260" y1="306" x2="260" y2="390" stroke="#e2513c" stroke-width="3" marker-end="url(#arrow)"/>
  <text class="arr" x="272" y="338" fill="#e2513c">HTTP</text>
  <text class="arr" x="272" y="356" fill="#e2513c">JSON</text>
  <text class="note" x="272" y="380" fill="#5c5245">VITE_USE_MOCK=false 일 때</text>

  <g>
    <rect x="46" y="406" width="440" height="96" fill="#1a1a1a"/>
    <rect x="40" y="400" width="440" height="96" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="3"/>
    <text class="title" x="64" y="428" fill="#f2b83a">BACKEND API</text>
    <text class="h1" x="64" y="454" fill="#fbf5e1">hanzawa-kanji-api</text>
    <text class="body" x="64" y="476" fill="#d4cab3">Kotlin + Spring Boot · :40324</text>
  </g>
</svg>
